name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            archive: AB-Maker-linux-x64.tar.gz
          - os: windows-latest
            name: windows-x64
            archive: AB-Maker-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── System dependencies ──────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libxcb-cursor0 libglib2.0-0 libgl1 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      # ── Python dependencies ──────────────────────────────────────
      - name: Install PyTorch (CPU)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies + PyInstaller
        run: pip install -r requirements.txt pyinstaller

      - name: Install VibeVoice-Realtime
        run: >
          pip install
          "vibevoice[streamingtts] @ git+https://github.com/microsoft/VibeVoice.git"
        continue-on-error: true

      # ── Build ────────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onedir \
            --name "AB-Maker" \
            --windowed \
            --add-data "frontend:frontend" \
            --add-data "data:data" \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --hidden-import "uvicorn.protocols.websockets.auto" \
            --hidden-import "uvicorn.lifespan.on" \
            --hidden-import "fastapi" \
            --hidden-import "webview" \
            --collect-all "webview" \
            --noconfirm \
            main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyinstaller ^
            --onedir ^
            --name "AB-Maker" ^
            --windowed ^
            --add-data "frontend;frontend" ^
            --add-data "data;data" ^
            --hidden-import "uvicorn.logging" ^
            --hidden-import "uvicorn.protocols.http.auto" ^
            --hidden-import "uvicorn.protocols.websockets.auto" ^
            --hidden-import "uvicorn.lifespan.on" ^
            --hidden-import "fastapi" ^
            --hidden-import "webview" ^
            --collect-all "webview" ^
            --noconfirm ^
            main.py

      # ── Package ──────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf AB-Maker-linux-x64.tar.gz -C dist AB-Maker

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path dist\AB-Maker -DestinationPath AB-Maker-windows-x64.zip

      # ── Upload artifacts ─────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: AB-Maker-${{ matrix.name }}
          path: ${{ matrix.archive }}
          retention-days: 14

  # ── Release (only on version tags) ──────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AB-Maker-linux-x64/AB-Maker-linux-x64.tar.gz
            artifacts/AB-Maker-windows-x64/AB-Maker-windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
